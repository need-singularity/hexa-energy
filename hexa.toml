# hexa.toml — hexa-energy standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-energy
# Provenance: extracted from canon/domains/energy/ on 2026-05-06
#             (n6-arch SHA c0f1f570). Sister to hexa-bio v1.0.0.

[package]
name = "hexa-energy"
version = "1.0.0"
entry = "cli/hexa-energy.hexa"
description = "Energy 통합 substrate (HEXA family) — battery + nuclear + grid + fuel-cell + HVAC + mineshaft 14-verb (fusion·antimatter·rtsc 외). Spec-first; 작동 .hexa CLI TBD. Fusion·antimatter·RT-SC는 별도 standalone — hexa-energy 작업 중 필요하면 해당 sibling CLI(hexa-fusion / hexa-antimatter / hexa-rtsc)를 직접 호출."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-energy"
homepage = "https://github.com/dancinlab/hexa-energy"
readme = "README.md"
keywords = ["energy", "battery", "nuclear", "grid", "fuel-cell", "hvac", "mineshaft", "solar", "pemfc", "smr", "hexa-family"]
categories = ["energy-systems", "infrastructure", "spec-substrate"]

[[bin]]
name = "hexa-energy"
path = "cli/hexa-energy.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager (hexa-lang) at install time.
# Phases: pre   → no python deps (pure-spec substrate at v1.0.0).
#         post  → quick selftest verb-count check (warn-only).
[scripts]
install = "install.hexa"

# ── Verb groups (14 verbs / 7 groups) ─────────────────────
# Each verb resides at module/<verb>/ (T2 in the canonical hexa-sscb pattern,
# raw 270/271/272/273 + arch.001 collapsed). The values below are verb
# directory names; resolve via module/<verb>/<verb>.md for the spec markdown.
#
# battery   : battery_arch, battery_energy
# nuclear   : nuclear, smr_dc, dc_reactor
# grid      : grid, pv_microgrid, solar
# fuel_cell : pemfc
# thermal   : hvac, thermal
# mining    : mineshaft
# meta      : arch, efficiency
verb_parent = "module"
[verbs]
battery   = ["battery_arch", "battery_energy"]
nuclear   = ["nuclear", "smr_dc", "dc_reactor"]
grid      = ["grid", "pv_microgrid", "solar"]
fuel_cell = ["pemfc"]
thermal   = ["hvac", "thermal"]
mining    = ["mineshaft"]
meta      = ["arch", "efficiency"]

# ── Closure provenance (raw#10 honest C3) ─────────────────
# v1.0.0 closure: 14-verb spec substrate (7 groups). 0/14 verbs have working
# .hexa CLI; 14/14 ship as spec-first markdown extracted from canon.
[closure]
verbs_total = 14
groups_total = 7
verbs_wired = 0
verbs_spec = 14
verdict = "SPEC_FIRST"
extracted_from = "canon/domains/energy/ @ c0f1f570"

# ── Cross-link (sister substrates — invoke their CLIs directly) ──
# Policy: when working inside hexa-energy and you need fusion or antimatter,
#         call the sibling CLI directly (hexa-fusion …, hexa-antimatter …).
#         Do NOT re-implement, re-vendor, or proxy these axes through hexa-energy.
[crosslink]
fusion     = "dancinlab/hexa-fusion (fusion 별도 standalone — call `hexa-fusion` CLI directly)"
antimatter = "dancinlab/hexa-antimatter (antimatter 별도 standalone — call `hexa-antimatter` CLI directly)"
rtsc       = "dancinlab/hexa-rtsc (RT-SC 별도 standalone — call `hexa-rtsc` CLI directly)"
earth      = "dancinlab/hexa-earth (climate cousin — carbon-capture · environmental-protection)"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "14-verb 통합 substrate (7 그룹). spec-first markdown only at v1.0.0 — 작동 .hexa CLI TBD."
not_scope = ["fusion (→ hexa-fusion CLI)", "antimatter (→ hexa-antimatter CLI)", "RT-SC / room-temp superconductor (→ hexa-rtsc CLI)", "carbon-capture & environmental (→ hexa-earth CLI)", "in-situ deployment validation"]

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (spec read + CLI dispatcher placeholder)"
selftest = "$0 (verb count check)"
